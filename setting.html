    <!-- Setting -->
    <div class="container" style="margin-top: 100px;">
        <h2>Edit Profile</h2>
        <div class="setting-profile-container">
            <div class="setting-profile-info">
                <img src="https://i.cbc.ca/1.5359228.1577206958!/fileImage/httpImage/image.jpg_gen/derivatives/16x9_940/smudge-the-viral-cat.jpg"
                    alt="Profile Picture" class="setting-profile-image">
                <span class="setting-profile-name">jus</span>
            </div>
            <button class="setting-edit-btn">
                <i class="fas fa-edit"></i> Edit
            </button>
        </div>
        <h2 style="margin-top: 40px;">Tickets</h2>
        <div class="setting-ticket-container">
            <a href="pending.html" class="setting-item">
                <div class="setting-icon2">
                    <i class="bi bi-wallet2"></i>
                </div>
                <p>Pending Payment</p>
            </a>
            <a href="payment.html" class="setting-item">
                <div class="setting-icon2">
                    <i class="bi bi-check-circle"></i>
                </div>
                <p>Payment Completed</p>
            </a>
            <a href="purchase.html" class="setting-item">
                <div class="setting-icon2">
                    <i class="bi bi-clock-history"></i>
                </div>
                <p>Purchase History</p>
            </a>
        </div>
        <div class="setting-bio-container">
            <h2>Biography</h2>
            <textarea class="setting-bio-textarea" placeholder="Write your bio here..."></textarea>
        </div>
        <div class="form-container">
            <div class="form-group-wrapper">
                <div class="form-group">
                    <h2>Gender</h2>
                    <div class="custom-select-container">
                        <select id="gender" name="gender">
                            <option value="" disabled selected>Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                        <div class="dropdown-icon" onclick="openDropdown()">
                            <i class="bi bi-caret-down-fill icon"></i>
                        </div>
                    </div>
                </div>
                <div class="birthday-container">
                    <h2>Birthday</h2>
                    <div>
                        <input type="text" class="birthday-input" placeholder="DD / MM / YY" id="birthday">
                        <div class="dropdown-icon2" onclick="document.querySelector('#birthday')._flatpickr.open();">
                            <i class="bi bi-calendar"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="setting-privacy-section">
            <h2 style="margin-top: 40px;">Privacy</h2>
            <div class="setting-password-container">
                <input type="password" placeholder="Password" class="setting-password-field">
                <input type="password" placeholder="New Password" class="setting-password-field">
                <input type="password" placeholder="Confirm Password" class="setting-password-field">
            </div>
        </div>
        <h2 style="margin-top: 40px;">Deactivate account</h2>
        <div class="setting-form-group-wrapper3">
            <span class="setting-profile-name" style="margin-top: 5px;">Deactivate your account</span>
            <button class="setting-edit-btn">Confirm</button>
        </div>

    </div>
    <!-- End Setting -->

                <a href="https://www.google.com/maps?q=Naresuan+University" class="link" target="_blank"><i
                        class="ti-location-pin"></i>
            </div>
