<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="assets/css/meyawo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="signup-page">
    <div class="signup-container">
        <div class="signup-box">
            <div class="signup-image">
                <img src="assets/imgs/EventNu1.png" alt="Signup Image">
            </div>
            <form method="POST" action="">
                <div class="form-group">
                    <input type="text" name="name" id="name" placeholder=" " class="signup-input-field" required>
                    <label for="name">Full Name</label>
                </div>
                <div class="form-group">
                    <input type="text" name="studentId" id="studentId" placeholder=" " class="signup-input-field" required>
                    <label for="studentId">Student ID</label>
                </div>
                <div class="form-group">
                    <input type="email" name="email" id="email" placeholder=" " class="signup-input-field" required>
                    <label for="email">Email</label>
                </div>
                <div class="form-group">
                    <input type="password" name="password" id="password" placeholder=" " class="signup-input-field" required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="signup-btn">Sign Up</a></button>
            </form>            
            <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </div>    
</body>
    <script>
        // Automatically hide the notification after 5 seconds
        setTimeout(function() {
            const notification = document.querySelector('.notification');
            if (notification) {
                notification.classList.remove('show');
            }
        }, 5000);
    </script>
</body>

</html>
