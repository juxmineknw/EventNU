<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="assets/css/meyawo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="signup-page">
    <div class="signup-container">
        <div class="signup-box">
            <div class="signup-image">
                <img src="assets/imgs/EventNu1.png" alt="Signup Image">
            </div>
            <p style="color: #333; margin-bottom: 10px;font-size: medium;">Select your role :</p>
            <!-- Buttons for each role -->
            <button class="signup-button" onclick="navigateTo('signup_nu.html')">University Staff</button>
            <button class="signup-button" onclick="navigateTo('signup_general.html')">General User</button>

            <p class="signup-link">Already have an account? <a href="index.html">Log In</a></p>
        </div>
    </div>

    <script>
        // JavaScript function to navigate to different pages
        function navigateTo(page) {
            window.location.href = page;
        }
    </script>
</body>


</html>
