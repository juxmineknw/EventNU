<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="assets/css/meyawo.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-image">
                <img src="assets/imgs/EventNu1.png" alt="Login Image">
            </div>
            <form method="POST" action="">
                <div class="form-group">
                    <input type="text" name="studentId" id="studentId" placeholder=" " class="login-input-field" required>
                    <label for="studentId">Student ID / Email</label>
                </div>
                <div class="form-group">
                    <input type="password" name="password" id="password" placeholder=" " class="login-input-field" required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>            
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>    
</body>
</html>
