<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="assets/css/meyawo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="signup-page">
    <div class="signup-container">
        <div class="signup-box">
            <div class="signup-image">
                <img src="assets/imgs/EventNu1.png" alt="Signup Image">
            </div>
            <form method="POST" action="">
                <div class="form-group">
                    <input type="text" name="first_name" id="first_name" placeholder=" " class="signup-input-field"
                        required>
                    <label for="first_name">First Name</label>
                </div>
                <div class="form-group">
                    <input type="text" name="last_name" id="last_name" placeholder=" " class="signup-input-field"
                        required>
                    <label for="last_name">Last Name</label>
                </div>
                <div class="form-group">
                    <input type="email" name="email" id="email" placeholder=" " class="signup-input-field" required>
                    <label for="email">Email</label>
                </div>
                <div class="form-group">
                    <input type="password" name="password" id="password" placeholder=" " class="signup-input-field"
                        required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="signup-btn">Sign Up</button>
            </form>
            <p>Already have an account? <a href="index.html">Log In</a></p>
        </div>
    </div>
</body>


</html>
