<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รูปในกรอบ</title>
    <style>
        /* กำหนดรูปแบบสำหรับกรอบ */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* กรอบสีขาว */
            border: 2px solid #ddd; /* เส้นขอบ */
            padding: 20px; /* ระยะห่างภายใน */
            margin: 20px auto; /* ตรงกลาง */
            width: 80%; /* ความกว้างของกรอบ */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* เงา */
        }

        .left,
        .right {
            flex: 1; /* ขนาดแบ่งเท่ากัน */
            padding: 10px;
        }

        .left img,
        .right img {
            width: 100%; /* ปรับให้เต็มพื้นที่ */
            height: auto; /* รักษาสัดส่วนของภาพ */
            border-radius: 8px; /* มุมมน */
        }

        .left {
            text-align: center; /* จัดให้อยู่ตรงกลาง */
        }

        .right {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .right p {
            font-size: 16px;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- ฝั่งซ้าย -->
        <div class="left">
            <img src="assets/imgs/พุ่งใต้เฟส.webp" alt="Event Left Image">
        </div>
        <!-- ฝั่งขวา -->
        <div class="right">
            <p>เนื้อหาด้านขวา เช่น คำบรรยายหรือข้อมูลเกี่ยวกับกิจกรรม</p>
        </div>
    </div>
</body>

</html>
