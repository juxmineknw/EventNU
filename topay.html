<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Start your development with Meyawo landing page.">
    <meta name="author" content="Devcrud">
    <!-- font icons -->
    <link rel="stylesheet" href="assets/vendors/themify-icons/css/themify-icons.css">
    <!-- meyao -->
    <link rel="stylesheet" href="assets/css/meyawo.css">
    <!-- font-awesome icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Bootstrap icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <!-- Material icons-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <title>QR Code พร้อมเพย์</title>
    <style>
        #slipImagePreview {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            text-align: center;
        }

        #slipImagePreview img {
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
        }

        #confirmActivityBtn {
            display: none;
            /* ซ่อนปุ่มยืนยันการเข้าร่วมกิจกรรมจนกว่าจะอัปโหลดรูป */
            margin-top: 20px;
        }
    </style>
</head>

<body class="topay-page">
    <div class="topay-container">
        <h2>QR Code พร้อมเพย์</h2>
        <div class="topay-layout-wrapper">
            <!-- ส่วนข้อมูลด้านซ้าย -->
            <div class="topay-left-section">
                <label class="topay-label">จำนวนเงิน (บาท)</label>
                <input type="number" id="amount" class="topay-input" placeholder="กรอกจำนวนเงิน" min="1" required>
                <button class="topay-btn" onclick="generatePromptPayQR()">สร้าง QR Code</button>
                <div class="topay-info">
                    <p><strong>Account : </strong> นางสาวกนกวรรณ บุญโย </p>
                    <p><strong>PromptPay : </strong> 0985499270 </p>
                </div>
                <canvas id="qrcode" class="topay-canvas"></canvas>
                <div id="price" class="topay-price"></div>
            </div>

            <!-- ส่วน QR Code และข้อมูลด้านขวา -->
            <div class="topay-right-section">
                <div>
                    <label for="slipImageUpload" class="topay-label">อัปโหลดรูปสลิปเงิน</label>
                    <input type="file" id="slipImageUpload" class="topay-input" accept="image/*"
                        onchange="previewSlipImage(event)">
                </div>
                <div id="slipImagePreview">
                    <p>ตัวอย่างสลิปเงิน:</p>
                    <img id="slipImage" src="" alt="Slip Image Preview" style="display: none;">
                </div>
                <button id="confirmActivityBtn" class="topay-btn"
                    onclick="confirmActivity()">ยืนยันการเข้าร่วมกิจกรรม</button>
                    <a href="pending.html" class="topay-btn back-btn">ย้อนกลับ</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script>
        function generatePromptPayQR() {
            const amount = document.getElementById("amount").value;

            if (!amount || amount <= 0) {
                alert("กรุณากรอกจำนวนเงินที่ถูกต้อง");
                return;
            }

            // ข้อมูล PromptPay
            const promptPayID = "0985499270"; // หมายเลขพร้อมเพย์ของคุณ
            const amountFixed = parseFloat(amount).toFixed(2);

            // สร้างข้อมูล QR Code
            const qrData = createPromptPayData(promptPayID, amountFixed);

            // ใช้ QRCode.js สร้าง QR Code
            const canvas = document.getElementById("qrcode");
            QRCode.toCanvas(canvas, qrData, { width: 300 }, function (error) {
                if (error) {
                    console.error(error);
                    alert("เกิดข้อผิดพลาดในการสร้าง QR Code");
                } else {
                    console.log("QR Code generated successfully.");
                }
            });

            // แสดงราคาที่ด้านล่าง
            document.getElementById("price").innerHTML = "จำนวนเงิน: " + amountFixed + " บาท";
        }

        function createPromptPayData(id, amount) {
            const payload = [
                "000201",                        // Format indicator
                "010211",                        // Version and QR type
                "29370016A000000677010111",      // PromptPay AID
                `011300${id.length}${id}`,       // PromptPay ID
                `5408${amount.padStart(6, '0')}`, // จำนวนเงิน
                "5802TH",                        // ประเทศ
                "6304"                           // CRC placeholder
            ];
            const data = payload.join("");
            const crc = calculateCRC16(data + "6304");
            return data + crc;
        }

        // ฟังก์ชันคำนวณ CRC16
        function calculateCRC16(input) {
            let crc = 0xFFFF;

            for (let i = 0; i < input.length; i++) {
                const byte = input.charCodeAt(i);
                crc ^= byte << 8;

                for (let j = 0; j < 8; j++) {
                    if (crc & 0x8000) {
                        crc = (crc << 1) ^ 0x1021;
                    } else {
                        crc <<= 1;
                    }
                }
            }

            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, "0");
        }

        // ฟังก์ชันแสดงตัวอย่างรูปภาพสลิป
        function previewSlipImage(event) {
            const file = event.target.files[0];
            const reader = new FileReader();

            reader.onload = function (e) {
                const slipImage = document.getElementById("slipImage");
                slipImage.src = e.target.result;
                slipImage.style.display = "block";

                // แสดงปุ่มยืนยันการเข้าร่วมกิจกรรม
                document.getElementById("confirmActivityBtn").style.display = "block";
            };

            if (file) {
                reader.readAsDataURL(file);
            }
        }

        // ฟังก์ชันยืนยันการเข้าร่วมกิจกรรม
        function confirmActivity() {
            alert("ยืนยันการเข้าร่วมกิจกรรมสำเร็จ!");
            window.location.href = "payment.html";
        }

    </script>
</body>

</html>
