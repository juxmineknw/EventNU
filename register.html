<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Register for the Event">
    <link rel="stylesheet" href="assets/css/meyawo.css">    
    <meta name="author" content="Devcrud">
    <title>Event Registration</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="register">
    <div class="register-container">
        <!-- Form Section -->
        <div class="register-form">
            <h2 class="register-heading" style="margin-left: 35px;">Event Registration</h2>

            <form action="submit_registration.php" method="POST" class="register-form">
                <!-- Full Name -->
                <div class="mb-3">
                    <label for="fullName" class="form-label register-label">First Name</label>
                    <input type="text" class="form-control register-input" id="fullName" name="fullName" required>
                </div>
                <div class="mb-3">
                    <label for="fullName" class="form-label register-label">Last Name</label>
                    <input type="text" class="form-control register-input" id="fullName" name="fullName" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label register-label">Email</label>
                    <input type="email" class="form-control register-input" id="email" name="email" placeholder="Enter your email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Please enter a valid email address" required>
                </div>

                <!-- Phone Number -->
                <div class="mb-3">
                    <label for="phone" class="form-label register-label">Phone Number</label>
                    <input type="tel" class="form-control register-input" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="000-000-0000" title="Please enter a 10-digit phone number" maxlength="10" required>
                </div>

                <!-- Submit Button -->
                <div class="text-center">
                    <a href="topay.html" class="register-pm">Process to Payment</a>
                </div>

                <!-- Back Button -->
                <div class="text-center">
                    <a href="javascript:history.back()" class="back-button">Go Back</a>
                </div>
            </form>
        </div>

        <!-- Image Section -->
        <div class="register-image">
            <img src="assets/imgs/cartoon.png" alt="Event Image">
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
